version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:v1.13.5-unprivileged   # pin exact version
    container_name: qdrant
    restart: unless-stopped
    user: "0:0"                           # non-root user (matches host UID:GID)
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - ./qdrant_data:/qdrant/storage           # 👈 mounted data folder (your DB)
      - ./qdrant/config/production.yaml:/qdrant/config/production.yaml:ro
