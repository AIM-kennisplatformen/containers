services:
  typedb:
    image: vaticle/typedb:2.29.1
    container_name: knowledgeplatform-typedb
    ports:
      - "1729:1729"
    restart: unless-stopped
    environment:
      - DATABASE_NAME=knowledgeplatform
    volumes:
      - ./data:/archive
      - ./entrypoint.sh:/entrypoint.sh
    entrypoint: ["sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/typedb-all-linux-x86_64/typedb console --core=localhost:1729 --command=\"database list\" > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
