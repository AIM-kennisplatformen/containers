  typedb:
    build: 
      context: .
      dockerfile: Dockerfile.typedb
    container_name: knowledgeplatform-typedb
    ports:
      - "1729:1729"
      - "8000:8000"
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      # Updated to use the correct 'typedb-server' paths
      - ./data/typedb:/var/lib/typedb/data
    healthcheck:
      test:
        - CMD-SHELL
        # Updated to check the correct 'typedb-server' paths
        - |
          if [ -f /opt/typedb-server-linux-x86_64/typedb ]; then
            CMD=/opt/typedb-server-linux-x86_64/typedb
          elif [ -f /opt/typedb-server-linux-arm64/typedb ]; then
            CMD=/opt/typedb-server-linux-arm64/typedb
          else
            echo "ERROR: Could not find typedb executable for any architecture." >&2
            exit 1
          fi
          $$CMD console --core=localhost:1729 --command='database list' > /dev/null 2>&1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s