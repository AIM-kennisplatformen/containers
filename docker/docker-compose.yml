services:
  qdrant:
    image: qdrant/qdrant:v1.13.5-unprivileged
    container_name: qdrant
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
      - ./qdrant/config/production.yaml:/qdrant/config/production.yaml:ro

volumes:
  qdrant_data:
